# =============================================================================
# GitHub Actions — Hermes Windows 安装包自动构建
# 每次推送 tag v* 时触发，构建 exe 并发布到 GitHub Release
# =============================================================================

name: Build Hermes Windows Installer

on:
  push:
    tags:
      - 'v*'               # tag 推送触发（如 v0.1.0）
  workflow_dispatch:        # 手动触发
    inputs:
      config:
        description: '构建配置'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION: 'gui/HermesInstaller/HermesInstaller.csproj'
  INNO_SETUP_VERSION: '6.2.2'

jobs:
  # ========================================
  # Job 1: 依赖检测
  # ========================================
  check:
    runs-on: windows-latest
    outputs:
      dotnet-version: ${{ steps.versions.outputs.dotnet }}
    steps:
      - uses: actions/checkout@v4

      - name: 检查 .NET SDK 版本
        id: versions
        run: |
          $ver = dotnet --version
          Write-Host "dotnet SDK: $ver"
          "dotnet=$ver" >> $env:GITHUB_OUTPUT

      - name: 验证最低版本
        run: |
          $actual = [Version](dotnet --version)
          $required = [Version]"8.0"
          if ($actual -lt $required) {
            Write-Error ".NET SDK $actual 低于要求 $required"
            exit 1
          }
          Write-Host "✓ .NET SDK 版本满足要求"

  # ========================================
  # Job 2: 构建 + 打包
  # ========================================
  build:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---- .NET 8 SDK ----
      - name: 安装 .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 显示 .NET 版本
        run: dotnet --info

      # ---- 还原依赖 ----
      - name: NuGet 还原
        run: dotnet restore ${{ env.SOLUTION }}

      # ---- 编译 WPF 项目 ----
      - name: 编译 WPF 安装向导
        run: |
          dotnet publish ${{ env.SOLUTION }} `
            -c ${{ github.event.inputs.config || 'Release' }} `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=false `
            -o publish/

      - name: 验证编译产物
        run: |
          if (Test-Path publish/HermesInstaller.exe) {
            $size = [math]::Round((Get-Item publish/HermesInstaller.exe).Length / 1MB, 1)
            Write-Host "✓ HermesInstaller.exe ($size MB)"
          } else {
            Write-Error "编译产物不存在"
            exit 1
          }

      # ---- 上传编译产物（供打包 job 使用） ----
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: hermes-installer-build
          path: publish/

  # ========================================
  # Job 3: Inno Setup 打包
  # ========================================
  package:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ---- 下载编译产物 ----
      - name: 下载编译产物
        uses: actions/download-artifact@v4
        with:
          name: hermes-installer-build
          path: publish/

      # ---- Inno Setup ----
      - name: 安装 Inno Setup
        run: |
          $url = "https://files.jrsoftware.org/is/6/innosetup-${{ env.INNO_SETUP_VERSION }}.exe"
          $installer = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process $installer -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
          Write-Host "Inno Setup 已安装"

      - name: 验证 Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          & $iscc /? 2>&1 | Select-Object -First 1
          Write-Host "Inno Setup 就绪"

      # ---- 确保编译产物在 Inno Setup 期望的位置 ----
      - name: 准备文件结构
        run: |
          $target = "gui\HermesInstaller\bin\Release\net8.0-windows\publish"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Copy-Item publish\* -Destination $target -Recurse -Force

      # ---- 打包 ----
      - name: Inno Setup 打包
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          & $iscc installer\hermes-installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ---- 验证 ----
      - name: 验证打包产物
        run: |
          $setup = Get-ChildItem installer\output -Filter "*.exe" | Select-Object -First 1
          if ($setup) {
            $size = [math]::Round($setup.Length / 1MB, 1)
            Write-Host "✓ $($setup.Name) ($size MB)"
          } else {
            Write-Error "未找到 exe"
            exit 1
          }

      # ---- 上传 exe ----
      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: HermesAgent-Setup
          path: installer/output/*.exe

  # ========================================
  # Job 4: GitHub Release 发布
  # ========================================
  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载安装包
        uses: actions/download-artifact@v4
        with:
          name: HermesAgent-Setup
          path: release/

      - name: 列出产物
        run: ls -lh release/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
